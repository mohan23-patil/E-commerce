    <!-- Main Content -->

          </div>

        <!-- Users Table -->
        <div class="bg-white rounded-lg shadow-sm overflow-hidden">

          <div class="overflow-x-auto">

                  <th class="p-4 font-semibold">#</th>
                  <th class="p-4 font-semibold">Name</th>
                  <th class="p-4 font-semibold">Email</th>
                  <th class="p-4 font-semibold">Phone</th>
                  <th class="p-4 font-semibold">Address</th>
                </tr>
              </thead>
              <tbody id="users-table">
                <tr><td colspan="5" class="text-center p-6 text-gray-500">Loading users...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Backend Integration Script -->
  <script>
    const API_BASE = "http://localhost:8080/api/users";

    // 🟢 Fetch and display users
    async function loadUsers() {
      try {
        const res = await fetch(`${API_BASE}/all`);
        if (!res.ok) throw new Error("Failed to fetch users");
        const users = await res.json();
        displayUsers(users);
      } catch (err) {
        console.error("Error fetching users:", err);
        document.getElementById("users-table").innerHTML = `
          <tr><td colspan="5" class="text-center p-6 text-red-500">Failed to load users</td></tr>`;
      }
    }

    // 🧾 Render table rows
    function displayUsers(users) {
      const tableBody = document.getElementById("users-table");
      tableBody.innerHTML = "";

      if (!users || users.length === 0) {
        tableBody.innerHTML = `
          <tr><td colspan="5" class="text-center p-6 text-gray-500">No users found.</td></tr>`;
        return;
      }

      users.forEach((user, index) => {
        const row = document.createElement("tr");
        row.className = "border-b border-black/10";
        row.innerHTML = `
          <td class="p-4">${index + 1}</td>
          <td class="p-4 font-medium">${user.name || "-"}</td>
          <td class="p-4">${user.email || "-"}</td>
          <td class="p-4">${user.phone || "N/A"}</td>
          <td class="p-4">${user.address || "N/A"}</td>
        `;
        tableBody.appendChild(row);
      });
    }

    // 🚀 Call when page loads
    loadUsers();
  </script>
