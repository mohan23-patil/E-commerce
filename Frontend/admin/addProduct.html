<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link crossorigin="" href="https://fonts.gstatic.com/" rel="preconnect"/>
<link as="style" href="https://fonts.googleapis.com/css2?display=swap&amp;family=Manrope:wght@400;500;700;800" onload="this.rel='stylesheet'" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#13a4ec",
            "background-light": "#f6f7f8",
            "background-dark": "#101c22",
          },
          fontFamily: {
            "display": ["Manrope"]
          },
        },
      },
    }
</script>
<title>Store Admin - Add Product</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-800 dark:text-slate-200">

<div class="flex min-h-screen">
<aside class="w-64 bg-yellow-400 dark:bg-card-dark flex-col hidden lg:flex border-r border-subtle-light dark:border-subtle-dark">
  <div class="flex items-center gap-3 h-16 px-6 border-b border-subtle-light dark:border-subtle-dark">
    <div class="text-dark size-7">
      <svg fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path d="M13.8261 30.5736C16.7203 29.8826 20.2244 29.4783 24 29.4783C27.7756 29.4783 31.2797 29.8826 34.1739 30.5736C36.9144 31.2278 39.9967 32.7669 41.3563 33.8352L24.8486 7.36089C24.4571 6.73303 23.5429 6.73303 23.1514 7.36089L6.64374 33.8352C8.00331 32.7669 11.0856 31.2278 13.8261 30.5736Z" fill="currentColor"></path>
      </svg>
    </div>
    <h1 class="text-xl font-bold">QuickBuy</h1>
  </div>
  <nav class="flex-1 px-4 py-6 space-y-2">
    <a class="flex items-center gap-3 px-4 py-2 rounded-lg text-muted-light hover:bg-dark/10 hover:text-dark:hover:bg-dark/20 transition-colors" href="/admin/adminHome.html">
      <span class="material-symbols-outlined">dashboard</span> Dashboard
    </a>
    <a class="flex items-center gap-3 px-4 py-2 rounded-lg bg-dark/10 dark:bg-dark/20 text-dark font-semibold" href="/admin/viewAllProduct.html">
      <span class="material-symbols-outlined">inventory_2</span> Products
    </a>
    <a class="flex items-center gap-3 px-4 py-2 rounded-lg text-muted-dark hover:bg-dark/10 hover:text-dark dark:hover:bg-dark/20 transition-colors" href="/admin/orders.html">
      <span class="material-symbols-outlined">receipt_long</span> Orders
    </a>
    <a class="flex items-center gap-3 px-4 py-2 rounded-lg text-muted-dark hover:bg-dark/10 hover:text-dark dark:hover:bg-dark/20 transition-colors" href="/admin/users.html">
      <span class="material-symbols-outlined">group</span> Users
    </a>
    <a class="flex items-center gap-3 px-4 py-2 rounded-lg text-muted-light hover:bg-dark/10 hover:text-dark dark:hover:bg-dark/20 transition-colors" href="/admin/categories.html">
      <span class="material-symbols-outlined">category</span> Categories
    </a>
  </nav>
</aside>

<!-- Main Content -->
<div class="flex-1 flex flex-col">
<header class="flex h-16 items-center justify-between border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-[#18262d] px-6">
  <h2 class="text-2xl font-bold text-gray-900 dark:text-white">Add Product</h2>
  <a href="/admin/viewAllProduct.html" class="text-primary hover:underline">← Back to Products</a>
</header>

<main class="flex-1 p-6 lg:p-8">
  <div class="max-w-2xl mx-auto bg-white dark:bg-slate-900/50 shadow-lg rounded-xl p-6 border border-slate-200 dark:border-slate-700">

    <h3 class="text-xl font-semibold mb-6 text-slate-900 dark:text-white">Enter Product Details</h3>

    <form id="addProductForm" class="space-y-5">
      <div>
        <label class="block font-medium mb-1">Product Name</label>
        <input type="text" id="name" required class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-4 py-2 bg-background-light dark:bg-slate-800 focus:ring-primary focus:border-primary"/>
      </div>

      <div>
        <label class="block font-medium mb-1">Description</label>
        <textarea id="description" rows="3" required class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-4 py-2 bg-background-light dark:bg-slate-800 focus:ring-primary focus:border-primary"></textarea>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block font-medium mb-1">Price</label>
          <input type="number" id="price" step="0.01" required class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-4 py-2 bg-background-light dark:bg-slate-800 focus:ring-primary focus:border-primary"/>
        </div>
        <div>
          <label class="block font-medium mb-1">Stock</label>
          <input type="number" id="stock" required class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-4 py-2 bg-background-light dark:bg-slate-800 focus:ring-primary focus:border-primary"/>
        </div>
      </div>

      <!-- ✅ Discount Field -->
      <div>
        <label class="block font-medium mb-1">Discount (%)</label>
        <input 
          type="number" 
          id="discount" 
          min="0" 
          max="100" 
          placeholder="Enter discount percentage"
          class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-4 py-2 bg-background-light dark:bg-slate-800 focus:ring-primary focus:border-primary"/>
      </div>

      <!-- ✅ Category Dropdown -->
      <div>
        <label class="block font-medium mb-1">Category</label>
        <select
          id="categorySelect"
          required
          class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-4 py-2 bg-background-light dark:bg-slate-800 focus:ring-primary focus:border-primary"
        >
          <option value="">Select Category</option>
          <option value="Mobile">Mobiles</option>
          <option value="Laptop">Laptops</option>
          <option value="Watch">Watches</option>
          <option value="Clothes">Clothes</option>
          <option value="Electronics">Electronics</option>
        </select>
      </div>

      <div>
        <label class="block font-medium mb-1">Product Image</label>
        <input type="file" id="imageFile" accept="image/*" class="block w-full text-sm text-gray-700 dark:text-gray-300 border border-gray-300 dark:border-gray-600 rounded-lg cursor-pointer bg-background-light dark:bg-slate-800 focus:ring-primary focus:border-primary"/>
      </div>

      <div class="pt-4">
        <button type="submit" class="w-full bg-primary text-white font-semibold py-2 rounded-lg hover:bg-primary/80 transition-colors">Add Product</button>
      </div>
    </form>

    <p id="message" class="text-center mt-4 font-medium"></p>
  </div>
</main>
</div>
</div>

<script>
const form = document.getElementById('addProductForm');
const message = document.getElementById('message');

form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const name = document.getElementById('name').value;
    const description = document.getElementById('description').value;
    const price = document.getElementById('price').value;
    const stock = document.getElementById('stock').value;
    const discount = document.getElementById('discount').value;
    const category = document.getElementById('categorySelect').value;
    const imageFile = document.getElementById('imageFile').files[0];

    const formData = new FormData();
    formData.append('name', name);
    formData.append('description', description);
    formData.append('price', price);
    formData.append('stock', stock);
    formData.append('discount', discount); // ✅ Added
    formData.append('category', category);
    if (imageFile) formData.append('imageFile', imageFile);

    try {
        const response = await fetch('http://localhost:8080/api/products/add', {
            method: 'POST',
            body: formData
        });

        if (response.ok) {
            message.textContent = '✅ Product added successfully!';
            message.className = "text-green-600 dark:text-green-400 text-center font-semibold mt-4";
            form.reset();

            setTimeout(() => {
                window.location.href = '/admin/viewAllProduct.html';
            }, 1000);
        } else {
            message.textContent = '❌ Failed to add product.';
            message.className = "text-red-600 dark:text-red-400 text-center font-semibold mt-4";
        }
    } catch (error) {
        console.error('Error:', error);
        message.textContent = '⚠️ Error connecting to server.';
        message.className = "text-yellow-600 dark:text-yellow-400 text-center font-semibold mt-4";
    }
});
</script>

</body>
</html>
