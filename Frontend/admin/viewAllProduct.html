<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link crossorigin="" href="https://fonts.gstatic.com/" rel="preconnect"/>
<link as="style" href="https://fonts.googleapis.com/css2?display=swap&amp;family=Manrope:wght@400;500;700;800" onload="this.rel='stylesheet'" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#13a4ec",
            "background-light": "#f6f7f8",
            "background-dark": "#101c22",
          },
          fontFamily: {
            "display": ["Manrope"]
          },
        },
      },
    }
</script>
<title>Admin - View Products</title>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-800 dark:text-slate-200">

<div class="flex min-h-screen">
<!-- Sidebar -->
<aside class="w-64 bg-yellow-400 dark:bg-card-dark flex-col hidden lg:flex border-r border-subtle-light dark:border-subtle-dark">
  <div class="flex items-center gap-3 h-16 px-6 border-b border-subtle-light dark:border-subtle-dark">
    <div class="text-dark size-7">
      <svg fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path d="M13.8261 30.5736C16.7203 29.8826 20.2244 29.4783 24 29.4783C27.7756 29.4783 31.2797 29.8826 34.1739 30.5736C36.9144 31.2278 39.9967 32.7669 41.3563 33.8352L24.8486 7.36089C24.4571 6.73303 23.5429 6.73303 23.1514 7.36089L6.64374 33.8352C8.00331 32.7669 11.0856 31.2278 13.8261 30.5736Z" fill="currentColor"></path>
      </svg>
    </div>
    <h1 class="text-xl font-bold">QuickBuy</h1>
  </div>
  <nav class="flex-1 px-4 py-6 space-y-2">
    <a class="flex items-center gap-3 px-4 py-2 rounded-lg text-muted-light hover:bg-dark/10 hover:text-dark:hover:bg-dark/20 transition-colors" href="/admin/adminHome.html">
      <span class="material-symbols-outlined">dashboard</span> Dashboard
    </a>
    <a class="flex items-center gap-3 px-4 py-2 rounded-lg bg-dark/10 dark:bg-dark/20 text-dark font-semibold" href="/admin/viewAllProduct.html">
      <span class="material-symbols-outlined">inventory_2</span> Products
    </a>
    <a class="flex items-center gap-3 px-4 py-2 rounded-lg text-muted-dark hover:bg-dark/10 hover:text-dark dark:hover:bg-dark/20 transition-colors" href="/admin/orders.html">
      <span class="material-symbols-outlined">receipt_long</span> Orders
    </a>
    <a class="flex items-center gap-3 px-4 py-2 rounded-lg text-muted-dark hover:bg-dark/10 hover:text-dark dark:hover:bg-dark/20 transition-colors" href="/admin/users.html">
      <span class="material-symbols-outlined">group</span> Users
    </a>
    <a class="flex items-center gap-3 px-4 py-2 rounded-lg text-muted-light hover:bg-dark/10 hover:text-dark dark:hover:bg-dark/20 transition-colors" href="/admin/categories.html">
      <span class="material-symbols-outlined">category</span> Categories
    </a>
  </nav>
</aside>

<!-- Main Content -->
<div class="flex-1 flex flex-col">
  <header class="flex h-16 items-center justify-between border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-[#18262d] px-6">
  <h2 class="text-2xl font-bold text-gray-900 dark:text-white">All Products</h2>
  <div class="flex items-center gap-4">
    <input 
      id="searchInput" 
      type="text" 
      placeholder="Search product..." 
      class="border px-4 py-2 rounded-lg focus:outline-none focus:ring focus:ring-primary/40 dark:bg-slate-800 dark:border-gray-700"
    />
    <a 
      href="/admin/addProduct.html" 
      class="flex items-center gap-2 px-4 py-2 bg-yellow-400 text-black font-bold rounded-lg shadow-md hover:bg-green-500 transition-all duration-200"
    >
      <span class="material-symbols-outlined">add</span>
      Add Product
    </a>
  </div>
</header>


  <!-- Gradient Background Section -->
  <main class="flex-1 p-6 lg:p-8" style="background: linear-gradient(135deg, #d5fefd, #fed6e3);">
    <div class="bg-white/80 backdrop-blur-md dark:bg-slate-900/70 rounded-xl shadow-lg overflow-x-auto border border-gray-100 dark:border-gray-700">
      <table class="w-full text-sm text-left text-slate-500 dark:text-slate-400">
        <thead class="text-xs text-slate-700 dark:text-slate-300 uppercase bg-slate-50/70 dark:bg-slate-800/70">
          <tr>
            <th class="px-6 py-3">Image</th>
            <th class="px-6 py-3">Product Name</th>
            <th class="px-6 py-3">Category</th>
            <th class="px-6 py-3">Price</th>
            <th class="px-6 py-3">Stock</th>
            <th class="px-6 py-3 text-right">Actions</th>
          </tr>
        </thead>
        <tbody id="productTableBody"></tbody>
      </table>
    </div>
  </main>
</div>
</div>

<!-- ✅ Modal Popup -->
<div id="modal" class="fixed inset-0 bg-black/40 flex items-center justify-center hidden z-50">
  <div class="bg-white dark:bg-gray-800 rounded-xl shadow-xl p-6 w-[90%] max-w-md text-center">
    <h3 id="modal-title" class="text-xl font-semibold text-gray-900 dark:text-white mb-4"></h3>
    <p id="modal-message" class="text-gray-700 dark:text-gray-300 mb-6"></p>
    <div class="flex justify-center gap-4">
      <button id="cancelBtn" class="px-4 py-2 bg-gray-300 hover:bg-gray-400 rounded-lg font-semibold">Cancel</button>
      <button id="confirmBtn" class="px-4 py-2 bg-red-500 text-white hover:bg-red-600 rounded-lg font-semibold">Confirm</button>
    </div>
  </div>
</div>

<!-- ✅ Toast Notification -->
<div id="toast" class="fixed bottom-5 right-5 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg hidden z-50 transition-all duration-500">
  Product deleted successfully!
</div>

<script>
const tableBody = document.getElementById('productTableBody');
const searchInput = document.getElementById('searchInput');
let allProducts = [];

// ✅ Fetch products (either all or category-wise)
async function loadProducts() {
  try {
    const params = new URLSearchParams(window.location.search);
    const category = params.get('category');

    const url = category
      ? `https://quickbuy-woqf.onrender.com/api/products/category/${category}`
      : 'https://quickbuy-woqf.onrender.com/api/products/all';

    const response = await fetch(url);
    allProducts = await response.json();
    displayProducts(allProducts);
  } catch (error) {
    console.error("Error loading products:", error);
  }
}

// ✅ Display products in table
function displayProducts(products) {
  tableBody.innerHTML = '';
  if (products.length === 0) {
    tableBody.innerHTML = `<tr><td colspan="6" class="text-center py-6 text-gray-500">No products found</td></tr>`;
    return;
  }

  products.forEach(product => {
    const row = document.createElement('tr');
    row.className = 'border-b hover:bg-gray-50 dark:hover:bg-gray-800 transition';
    row.innerHTML = `
      <td class="px-6 py-4">
        <img src="https://quickbuy-woqf.onrender.com/uploads/${product.image}" alt="${product.name}" class="w-12 h-12 object-cover rounded-lg"/>
      </td>
      <td class="px-6 py-4 font-medium text-slate-900 dark:text-white">${product.name}</td>
      <td class="px-6 py-4">${product.category}</td>
      <td class="px-6 py-4">₹${product.price}</td>
      <td class="px-6 py-4">${product.stock}</td>
      <td class="px-6 py-4 text-right space-x-2">
        <button onclick="editProduct(${product.id})" class="text-blue-500 hover:text-blue-700">
          <span class="material-symbols-outlined">edit</span>
        </button>
        <button onclick="confirmDelete(${product.id})" class="text-red-500 hover:text-red-700">
          <span class="material-symbols-outlined">delete</span>
        </button>
      </td>
    `;
    tableBody.appendChild(row);
  });
}

// ✅ Search filter
searchInput.addEventListener('input', () => {
  const searchText = searchInput.value.toLowerCase();
  const filtered = allProducts.filter(p => p.name.toLowerCase().includes(searchText));
  displayProducts(filtered);
});

// ✅ Modern popup for delete confirmation
const modal = document.getElementById('modal');
const modalTitle = document.getElementById('modal-title');
const modalMessage = document.getElementById('modal-message');
const cancelBtn = document.getElementById('cancelBtn');
const confirmBtn = document.getElementById('confirmBtn');
let deleteId = null;

function confirmDelete(id) {
  deleteId = id;
  modalTitle.textContent = "Confirm Deletion";
  modalMessage.textContent = "Are you sure you want to delete this product? This action cannot be undone.";
  modal.classList.remove('hidden');
}

cancelBtn.onclick = () => modal.classList.add('hidden');

confirmBtn.onclick = async () => {
  if (deleteId) {
    try {
      await fetch(`https://quickbuy-woqf.onrender.com/api/products/delete/${deleteId}`, { method: 'DELETE' });
      modal.classList.add('hidden');
      showToast("✅ Product deleted successfully!");
      loadProducts();
    } catch (error) {
      console.error('Delete error:', error);
    }
  }
};

// ✅ Toast Notification
function showToast(message) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.remove('hidden');
  setTimeout(() => toast.classList.add('hidden'), 3000);
}

// ✅ Edit product redirect
function editProduct(id) {
  window.location.href = `/admin/updateProduct.html?id=${id}`;
}

// Load products on page load
loadProducts();
</script>

</body>
</html>
