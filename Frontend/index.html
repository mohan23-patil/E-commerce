<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QuickBuy - Login/Register</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin href="https://fonts.gstatic.com/" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        "primary": "#0b95da",
      },
      fontFamily: { display: ["Manrope"] },
    },
  },
};
</script>
<style>
 body {
   background: linear-gradient(135deg, #fff9e6, #d5fefd, #fed6e3);
   min-height: 100vh;
   font-family: "Manrope", sans-serif;
 }
.form-container { transition: transform 0.5s ease-in-out; }
.password-container { position: relative; }
.password-container input { padding-right: 2.5rem; }
.password-container button { position: absolute; top: 50%; right: 0.75rem; transform: translateY(-50%); cursor: pointer; color: #9ca3af; }
.password-container button:hover { color: #0b95da; }
.fade-in { animation: fadeIn 0.3s ease-in-out; }
@keyframes fadeIn { from { opacity: 0; transform: scale(0.95);} to {opacity:1; transform: scale(1);} }
</style>
</head>
<body class="font-display text-gray-800">

<!-- Popup -->
<div id="popupModal" class="fixed inset-0 flex items-center justify-center bg-black bg-opacity-50 hidden z-50">
  <div class="bg-white rounded-xl shadow-lg p-6 max-w-sm text-center fade-in">
    <h3 id="popupMessage" class="text-lg font-semibold text-gray-800 mb-4"></h3>
    <button id="popupOkBtn" class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary/90 transition">OK</button>
  </div>
</div>

<header class="bg-yellow-400 shadow-md sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between text-gray-900">
    <a href="index.html" class="flex items-center gap-2">
      <span class="material-symbols-outlined text-3xl text-gray-900">shopping_bag</span>
      <h1 class="text-xl font-extrabold tracking-wide text-gray-900">QuickBuy</h1>
    </a>
  </div>
</header>

<main class="flex items-center justify-center py-12 px-4">
  <div class="max-w-md w-full bg-white rounded-xl shadow-lg overflow-hidden">
    <div class="flex">
      <div id="login-tab" class="w-1/2 p-4 text-center font-bold border-b-2 border-primary text-primary cursor-pointer">Login</div>
      <div id="register-tab" class="w-1/2 p-4 text-center font-bold text-gray-500 border-b-2 border-transparent cursor-pointer">Register</div>
    </div>

    <div class="overflow-hidden">
      <div id="form-slider" class="flex w-[200%]">

        <!-- Login Form -->
        <div class="w-1/2 p-8 form-container">
          <h2 class="text-2xl font-bold text-center mb-6">Welcome Back!</h2>
          <form id="loginForm" class="space-y-6">
            <input id="login-email" type="email" placeholder="Email address" required class="w-full px-3 py-3 border rounded-lg"/>
            <div class="password-container">
              <input id="login-password" type="password" placeholder="Password" required class="w-full px-3 py-3 border rounded-lg"/>
              <button type="button" onclick="togglePassword('login-password')">
                <span class="material-symbols-outlined">visibility</span>
              </button>
            </div>
            <button type="submit" class="w-full py-3 bg-yellow-400 font-bold rounded-lg hover:bg-green-600 text-gray-900">Sign in</button>
          </form>
        </div>

        <!-- Register Form -->
        <div class="w-1/2 p-8 form-container">
          <h2 class="text-2xl font-bold text-center mb-6">Create an Account</h2>
          <form id="registerForm" class="space-y-4">
            <input id="reg-name" type="text" placeholder="Full Name" required class="w-full px-3 py-3 border rounded-lg"/>
            <input id="reg-email" type="email" placeholder="Email address" required class="w-full px-3 py-3 border rounded-lg"/>
            <input id="reg-phone" type="text" placeholder="Phone number" required class="w-full px-3 py-3 border rounded-lg"/>
            <input id="reg-address" type="text" placeholder="Address" required class="w-full px-3 py-3 border rounded-lg"/>
            <div class="password-container">
              <input id="reg-password" type="password" placeholder="Password" required class="w-full px-3 py-3 border rounded-lg"/>
              <button type="button" onclick="togglePassword('reg-password')">
                <span class="material-symbols-outlined">visibility</span>
              </button>
            </div>
            <button type="submit" class="w-full py-3 bg-green-500 hover:bg-green-600 text-white font-bold rounded-lg">Register</button>
          </form>
        </div>

      </div>
    </div>
  </div>
</main>

<script>
const loginTab=document.getElementById("login-tab"),registerTab=document.getElementById("register-tab"),formSlider=document.getElementById("form-slider");
loginTab.onclick=()=>{formSlider.style.transform="translateX(0%)";loginTab.classList.add("border-primary","text-primary");registerTab.classList.remove("border-primary","text-primary")};
registerTab.onclick=()=>{formSlider.style.transform="translateX(-50%)";registerTab.classList.add("border-primary","text-primary");loginTab.classList.remove("border-primary","text-primary")};
function togglePassword(id){const i=document.getElementById(id);i.type=i.type==="password"?"text":"password"}
const popup=document.getElementById("popupModal"),popupMessage=document.getElementById("popupMessage"),popupOkBtn=document.getElementById("popupOkBtn");
function showPopup(msg){popupMessage.innerText=msg;popup.classList.remove("hidden")}
popupOkBtn.onclick=()=>popup.classList.add("hidden");

document.getElementById("loginForm").addEventListener("submit",async e=>{
 e.preventDefault();
 const email=document.getElementById("login-email").value.trim();
 const password=document.getElementById("login-password").value.trim();
 if(!email||!password){showPopup("Please fill all fields!");return;}
 try{
   const res=await fetch("http://localhost:8080/api/users/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,password})});
   const data=await res.json();
   if(data&&data.email){
     localStorage.setItem("userEmail",data.email);
     showPopup("Login successful!");
     setTimeout(()=>window.location.href="/users/userHome.html",1000);
   }else showPopup("Invalid email or password!");
 }catch(err){console.error(err);showPopup("Server error!");}
});

document.getElementById("registerForm").addEventListener("submit",async e=>{
 e.preventDefault();
 const user={
   name:document.getElementById("reg-name").value,
   email:document.getElementById("reg-email").value,
   password:document.getElementById("reg-password").value,
   phone:document.getElementById("reg-phone").value,
   address:document.getElementById("reg-address").value
 };
 try{
   const res=await fetch("http://localhost:8080/api/users/register",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(user)});
   if(res.ok){showPopup("Registration successful! Please login.");setTimeout(()=>loginTab.click(),1200);}
   else showPopup("Email already exists or invalid data!");
 }catch(e){console.error(e);showPopup("Error connecting to server!");}
});
</script>
</body>
</html>
