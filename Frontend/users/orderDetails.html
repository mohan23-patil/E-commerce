<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>QuickBuy - Order Details</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ["Manrope"],
            },

            colors: {
              primary: "#13a4ec",
              success: "#22c55e",
              danger: "#ef4444",
              neutral: "#d1d5db",
            },
          },
        },
      };
    </script>

    <!-- Fonts & Icons -->
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />

    <style>
      body {
        background: linear-gradient(
          135deg,
          #fff9e6,
          #d5fefd,
          #fed6e3
        );

        min-height: 100vh;
        font-family: "Manrope", sans-serif;
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.5);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.4);
      }

      .step-line {
        height: 4px;
        flex: 1;
        background: #d1d5db;
        border-radius: 999px;
        transition: all 0.4s ease;
      }

      .step .icon {
        transition: all 0.3s ease;
      }

      .step.completed .icon {
        background: #22c55e;
        color: white;
        transform: scale(1.1);
      }

      .step.active .icon {
        background: #ef4444;
        color: white;
        transform: scale(1.15);
        box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
      }

      .step.pending .icon {
        background: #d1d5db;
        color: #555;
      }

      .toast {
        position: fixed;
        bottom: 25px;
        right: 25px;
        background: #16a34a;
        color: white;
        padding: 14px 22px;
        border-radius: 12px;
        font-weight: 600;
        opacity: 0;
        transform: translateY(20px);
        transition: all 0.4s ease;
        z-index: 9999;
      }

      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      .mobile-menu {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.4s ease;
      }

      .mobile-menu.active {
        max-height: 400px;
      }

      @media (max-width: 768px) {
        .timeline-wrapper {
          flex-direction: column;
          align-items: flex-start;
          gap: 20px;
        }

        .step-line {
          width: 4px;
          height: 40px;
          margin-left: 18px;
        }
      }
    </style>
  </head>

  <body class="font-display text-gray-900">

    <!-- ================= NAVBAR ================= -->
    <header class="bg-yellow-400 shadow-md sticky top-0 z-50">
      <div
        class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between"
      >

        <!-- Logo -->
        <a
          href="/users/orders.html"
          class="flex items-center gap-2"
        >
          <span class="material-symbols-outlined text-3xl">
            arrow_back
          </span>

          <h1
            class="text-lg sm:text-xl md:text-2xl font-extrabold"
          >
            Order Details
          </h1>
        </a>

        <!-- Mobile Menu Button -->
        <button
          id="menu-btn"
          class="md:hidden"
        >
          <span class="material-symbols-outlined text-3xl">
            menu
          </span>
        </button>

        <!-- Desktop Menu -->
        <nav
          class="hidden md:flex gap-6 font-semibold"
        >
          <a
            href="/users/userHome.html"
            class="hover:text-gray-700 transition"
          >
            Home
          </a>

          <a
            href="/users/products.html"
            class="hover:text-gray-700 transition"
          >
            Shop
          </a>

          <a
            href="/users/orders.html"
            class="hover:text-gray-700 transition"
          >
            Orders
          </a>

          <a
            href="/users/profile.html"
            class="hover:text-gray-700 transition"
          >
            Profile
          </a>
        </nav>
      </div>

      <!-- Mobile Navigation -->
      <div
        id="mobile-menu"
        class="mobile-menu md:hidden bg-yellow-300"
      >
        <nav
          class="flex flex-col gap-4 px-6 py-4 font-semibold"
        >
          <a href="/users/userHome.html">Home</a>
          <a href="/users/products.html">Shop</a>
          <a href="/users/orders.html">Orders</a>
          <a href="/users/profile.html">Profile</a>
        </nav>
      </div>
    </header>

    <!-- ================= MAIN SECTION ================= -->
    <section
      class="max-w-7xl mx-auto px-4 sm:px-6 py-8 sm:py-12"
    >

      <div
        class="grid grid-cols-1 lg:grid-cols-2 gap-8"
      >

        <!-- ================= ORDER SUMMARY ================= -->
        <div
          class="glass-card rounded-3xl shadow-xl p-5 sm:p-8"
        >

          <h2
            class="text-2xl sm:text-3xl font-extrabold mb-6"
          >
            Order Summary
          </h2>

          <!-- Dynamic Order Details -->
          <div
            id="order-details"
            class="space-y-4 text-gray-700"
          >
            <p>Loading order details...</p>
          </div>

          <!-- Back Button -->
          <div class="mt-8">
            <a
              href="/users/orders.html"
              class="inline-block bg-yellow-400 hover:bg-green-500 hover:text-white text-black font-bold px-6 py-3 rounded-xl transition duration-300"
            >
              ← Back to Orders
            </a>
          </div>
        </div>

        <!-- ================= ORDER TIMELINE ================= -->
        <div
          class="glass-card rounded-3xl shadow-xl p-5 sm:p-8"
        >

          <h3
            class="text-2xl sm:text-3xl font-extrabold mb-10"
          >
            Order Progress
          </h3>

          <!-- Timeline -->
          <div
            class="timeline-wrapper flex items-center justify-between"
          >

            <!-- STEP 1 -->
            <div
              class="step flex flex-col items-center text-center"
              id="step-placed"
            >
              <div
                class="icon w-12 h-12 rounded-full flex items-center justify-center bg-neutral"
              >
                <span
                  class="material-symbols-outlined"
                >
                  shopping_cart
                </span>
              </div>

              <span
                class="mt-3 font-bold text-sm sm:text-base"
              >
                Placed
              </span>

              <span
                id="date-placed"
                class="text-xs text-gray-500"
              >
                —
              </span>
            </div>

            <div class="step-line"></div>

            <!-- STEP 2 -->
            <div
              class="step flex flex-col items-center text-center"
              id="step-shipped"
            >
              <div
                class="icon w-12 h-12 rounded-full flex items-center justify-center bg-neutral"
              >
                <span
                  class="material-symbols-outlined"
                >
                  local_shipping
                </span>
              </div>

              <span
                class="mt-3 font-bold text-sm sm:text-base"
              >
                Shipped
              </span>

              <span
                id="date-shipped"
                class="text-xs text-gray-500"
              >
                —
              </span>
            </div>

            <div class="step-line"></div>

            <!-- STEP 3 -->
            <div
              class="step flex flex-col items-center text-center"
              id="step-delivered"
            >
              <div
                class="icon w-12 h-12 rounded-full flex items-center justify-center bg-neutral"
              >
                <span
                  class="material-symbols-outlined"
                >
                  package_2
                </span>
              </div>

              <span
                class="mt-3 font-bold text-sm sm:text-base"
              >
                Delivered
              </span>

              <span
                id="date-delivered"
                class="text-xs text-gray-500"
              >
                —
              </span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- ================= JAVASCRIPT ================= -->
    <script>

      // ================= MOBILE MENU =================
      const menuBtn =
        document.getElementById("menu-btn");

      const mobileMenu =
        document.getElementById("mobile-menu");

      menuBtn.addEventListener("click", () => {
        mobileMenu.classList.toggle("active");
      });

      // ================= API =================
      const API_URL =
        "https://quickbuy-woqf.onrender.com/api/orders";

      // ================= TOAST =================
      function showToast(message) {

        const toast =
          document.createElement("div");

        toast.className = "toast";
        toast.textContent = message;

        document.body.appendChild(toast);

        setTimeout(() => {
          toast.classList.add("show");
        }, 100);

        setTimeout(() => {
          toast.remove();
        }, 3000);
      }

      // ================= IMAGE URL =================
      function imageUrl(itemImage) {

        if (!itemImage) {
          return "https://via.placeholder.com/80?text=No+Image";
        }

        if (itemImage.startsWith("http")) {
          return itemImage;
        }

        return `https://quickbuy-woqf.onrender.com/uploads/${itemImage}`;
      }

      // ================= ORDER TIMELINE =================
      function updateOrderTimeline(status, date) {

        const steps = [
          "Placed",
          "Shipped",
          "Delivered",
        ];

        const currentIndex =
          steps.indexOf(status);

        const stepEls = steps.map((step) =>
          document.getElementById(
            `step-${step.toLowerCase()}`
          )
        );

        const lines =
          document.querySelectorAll(".step-line");

        stepEls.forEach((el, i) => {

          el.classList.remove(
            "completed",
            "active",
            "pending"
          );

          if (i < currentIndex) {

            el.classList.add("completed");

            if (lines[i]) {
              lines[i].style.background =
                "#22c55e";
            }

          } else if (i === currentIndex) {

            el.classList.add("active");

            if (lines[i]) {
              lines[i].style.background =
                "#ef4444";
            }

          } else {

            el.classList.add("pending");

            if (lines[i]) {
              lines[i].style.background =
                "#d1d5db";
            }
          }
        });

        // Dates
        document.getElementById(
          "date-placed"
        ).textContent = date || "—";

        if (currentIndex >= 1) {
          document.getElementById(
            "date-shipped"
          ).textContent = "Next Day";
        }

        if (currentIndex >= 2) {
          document.getElementById(
            "date-delivered"
          ).textContent = "2 Days Later";
        }
      }

      // ================= LOAD ORDER DETAILS =================
      async function loadOrderDetails() {

        const id =
          localStorage.getItem(
            "selectedOrderId"
          );

        const container =
          document.getElementById(
            "order-details"
          );

        if (!id) {

          container.innerHTML = `
            <p class="text-red-600 font-semibold">
              No order selected!
            </p>
          `;

          return;
        }

        try {

          const res = await fetch(
            `${API_URL}/${id}`
          );

          if (!res.ok) {
            throw new Error(
              "Failed to fetch order"
            );
          }

          const order = await res.json();

          const items = Array.isArray(
            order.items
          )
            ? order.items
            : [];

          const itemsHTML = items
            .map(
              (item) => `
                <li class="flex items-center gap-4 border-b pb-3">
                  
                  <img
                    src="${imageUrl(item.image)}"
                    class="w-16 h-16 rounded-xl border object-cover"
                  />

                  <div>
                    <p class="font-semibold text-gray-900">
                      ${item.productName}
                    </p>

                    <p class="text-sm text-gray-600">
                      Quantity: ${item.quantity}
                    </p>
                  </div>
                </li>
              `
            )
            .join("");

          container.innerHTML = `
            <div class="space-y-3">

              <p>
                <span class="font-bold">
                  Customer:
                </span>
                ${order.name}
              </p>

              <p>
                <span class="font-bold">
                  Email:
                </span>
                ${order.email}
              </p>

              <p>
                <span class="font-bold">
                  Phone:
                </span>
                ${order.phone}
              </p>

              <p>
                <span class="font-bold">
                  Address:
                </span>
                ${order.address}
              </p>

              <p>
                <span class="font-bold">
                  Payment:
                </span>
                ${order.paymentMethod}
              </p>

              <p>
                <span class="font-bold">
                  Status:
                </span>

                <span class="text-green-600 font-semibold">
                  ${order.status}
                </span>
              </p>

              <p>
                <span class="font-bold">
                  Total:
                </span>

                ₹${order.totalAmount}
              </p>

              <p>
                <span class="font-bold">
                  Date:
                </span>

                ${order.date}
              </p>
            </div>

            <div class="mt-8">
              <h4 class="text-xl font-bold mb-4">
                Ordered Items
              </h4>

              <ul class="space-y-4">
                ${itemsHTML}
              </ul>
            </div>
          `;

          updateOrderTimeline(
            order.status,
            order.date
          );

        } catch (error) {

          console.error(error);

          container.innerHTML = `
            <p class="text-red-600 font-semibold">
              Failed to load order details!
            </p>
          `;

          showToast(
            "❌ Error loading order details"
          );
        }
      }

      // ================= PAGE LOAD =================
      document.addEventListener(
        "DOMContentLoaded",
        loadOrderDetails
      );
    </script>
  </body>
</html>
