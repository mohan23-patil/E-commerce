<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuickBuy - Cart</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: { primary: "#13a4ec", "background-light": "#f6f7f8", "background-dark": "#101c22" },
            fontFamily: { display: ["Manrope"] },
          },
        },
      };
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <style>
      html { scroll-behavior: smooth; }
      body {
        background: linear-gradient(180deg, #fff9e6 0%, #d5fefd 50%, #fed6e3 100%);
        background-attachment: fixed;
        min-height: 100vh;
        font-family: "Manrope", sans-serif;
        overflow-x: hidden;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.3);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.4);
        transition: all 0.3s ease-in-out;
      }
      .glass-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0, 0, 0, 0.12); }
      .mobile-menu { display: none; }
      @media (max-width: 768px) {
        .desktop-menu { display: none; }
        .mobile-menu { display: block; }
        .cart-card { flex-direction: column; align-items: flex-start !important; }
        .cart-image { width: 100% !important; height: 220px !important; }
        .cart-right { width: 100%; text-align: left !important; }
        .summary-card { margin-top: 10px; }
      }
      @media (max-width: 480px) {
        .cart-image { height: 180px !important; }
        .cart-title { font-size: 1rem; }
        .cart-price { font-size: 1rem; }
        .checkout-btn, .clear-btn { padding: 12px; font-size: 14px; }
      }
    </style>
  </head>

  <body class="font-display text-black">
    <header class="bg-yellow-400 shadow-md sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
        <a href="/users/userHome.html" class="flex items-center gap-2">
          <span class="material-symbols-outlined text-3xl text-black">shopping_bag</span>
          <h1 class="text-xl md:text-2xl font-extrabold tracking-wide text-black">QuickBuy</h1>
        </a>
        <nav class="desktop-menu hidden md:flex gap-6 font-medium text-black">
          <a href="/users/userHome.html" class="hover:text-gray-700">Home</a>
          <a href="/users/products.html" class="hover:text-gray-700">Shop</a>
          <a href="/users/orders.html" class="hover:text-gray-700">My Orders</a>
          <a href="/users/about.html" class="hover:text-gray-700">About</a>
          <a href="/users/contact.html" class="hover:text-gray-700">Contact</a>
        </nav>
        <div class="flex items-center gap-4">
          <a href="cart.html" class="relative">
            <span class="material-symbols-outlined text-2xl text-black">shopping_cart</span>
            <span id="cart-count" class="absolute -top-2 -right-2 bg-red-700 text-white text-xs px-1.5 py-0.5 rounded-full font-semibold">0</span>
          </a>
          <a href="profile.html">
            <span class="material-symbols-outlined text-2xl text-black">account_circle</span>
          </a>
          <button id="menuBtn" class="mobile-menu md:hidden">
            <span class="material-symbols-outlined text-3xl">menu</span>
          </button>
        </div>
      </div>
      <div id="mobileMenu" class="hidden md:hidden bg-yellow-300 px-5 pb-5 flex flex-col gap-4 font-semibold">
        <a href="/users/userHome.html">Home</a>
        <a href="/users/products.html">Shop</a>
        <a href="/users/orders.html">My Orders</a>
        <a href="/users/about.html">About</a>
        <a href="/users/contact.html">Contact</a>
      </div>
    </header>

    <section class="max-w-7xl mx-auto px-4 md:px-6 py-10">
      <h2 class="text-3xl md:text-4xl font-extrabold mb-8 text-gray-900">Your Cart</h2>
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-2 space-y-6" id="cart-items"></div>
        <div class="summary-card glass-card p-6 rounded-2xl shadow-lg h-fit sticky top-24">
          <h3 class="text-2xl font-extrabold mb-6 text-gray-900">Order Summary</h3>
          <div class="space-y-4 text-gray-800">
            <div class="flex justify-between"><span>Subtotal</span><span id="subtotal" class="font-semibold">₹0</span></div>
            <div class="flex justify-between"><span>Tax (5%)</span><span id="tax" class="font-semibold">₹0</span></div>
            <div class="flex justify-between"><span>Delivery</span><span id="delivery" class="font-semibold">₹30</span></div>
            <div class="border-t border-gray-300 my-4"></div>
            <div class="flex justify-between text-xl font-bold"><span>Total</span><span id="total">₹0</span></div>
          </div>
          <a href="/users/checkout.html" class="checkout-btn block text-center w-full mt-8 bg-gradient-to-r from-yellow-400 to-yellow-500 text-black py-3 rounded-xl font-bold shadow transition-all duration-300 hover:from-green-500 hover:to-green-600 hover:text-white hover:scale-[1.02]">
            Proceed to Checkout
          </a>
          <button onclick="clearCart()" class="clear-btn w-full mt-4 bg-red-500 hover:bg-red-600 text-white py-3 rounded-xl font-bold shadow transition-all duration-300 hover:scale-[1.02]">
            Clear Cart
          </button>
        </div>
      </div>
    </section>

    <footer class="bg-yellow-400 text-gray-900 py-6 mt-20">
      <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-4">
        <p class="text-sm font-semibold text-center">© 2025 QuickBuy. All Rights Reserved.</p>
        <div class="flex gap-5 text-xl">
          <a href="#" class="hover:text-blue-600 transition"><i class="fa-brands fa-facebook"></i></a>
          <a href="#" class="hover:text-pink-600 transition"><i class="fa-brands fa-square-instagram"></i></a>
          <a href="#" class="hover:text-sky-500 transition"><i class="fa-brands fa-square-twitter"></i></a>
          <a href="#" class="hover:text-red-600 transition"><i class="fa-brands fa-youtube"></i></a>
        </div>
      </div>
    </footer>

    <script>
      const API_BASE = "https://quickbuy-woqf.onrender.com/api/cart";

      const menuBtn = document.getElementById("menuBtn");
      const mobileMenu = document.getElementById("mobileMenu");
      menuBtn.addEventListener("click", () => { mobileMenu.classList.toggle("hidden"); });

      async function loadCart() {
        try {
          const res = await fetch(`${API_BASE}/all`);
          const data = await res.json();
          displayCart(data);
        } catch (err) {
          console.error("Error loading cart:", err);
        }
      }

      function displayCart(items) {
        const cartContainer = document.getElementById("cart-items");
        cartContainer.innerHTML = "";

        if (items.length === 0) {
          cartContainer.innerHTML = `<div class="text-center text-gray-700 text-lg font-medium bg-white p-10 rounded-2xl shadow">🛒 Your cart is empty.</div>`;
          updateSummary([]);
          document.getElementById("cart-count").innerText = 0;
          return;
        }

        document.getElementById("cart-count").innerText = items.length;

        items.forEach((item) => {
          const totalPrice = (item.price * item.quantity).toFixed(2);
          const card = document.createElement("div");
          card.className = "cart-card glass-card p-5 rounded-2xl flex items-center gap-5 shadow";
          card.innerHTML = `
            <img src="${item.image}" alt="${item.name}" class="cart-image w-28 h-28 rounded-xl object-cover border shadow"/>
            <div class="flex-1">
              <h3 class="cart-title text-xl font-bold text-gray-900">${item.name}</h3>
              <p class="text-gray-700 mt-1">Price: ₹${item.price}</p>
              <div class="flex items-center gap-3 mt-4">
                <button onclick="updateQuantity(${item.id}, ${item.quantity - 1})" class="bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded-lg font-bold">-</button>
                <span class="font-semibold text-lg">${item.quantity}</span>
                <button onclick="updateQuantity(${item.id}, ${item.quantity + 1})" class="bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded-lg font-bold">+</button>
              </div>
            </div>
            <div class="cart-right text-right">
              <p class="cart-price text-xl font-bold text-black">₹${totalPrice}</p>
              <button onclick="deleteCart(${item.id})" class="text-red-500 hover:text-red-700 mt-3 text-sm font-bold">Remove</button>
            </div>
          `;
          cartContainer.appendChild(card);
        });

        updateSummary(items);
      }

      function updateSummary(items) {
        let subtotal = 0;
        items.forEach((item) => { subtotal += item.price * item.quantity; });
        const tax = subtotal * 0.05;
        const delivery = subtotal >= 500 ? 0 : items.length > 0 ? 30 : 0;
        const total = subtotal + tax + delivery;
        document.getElementById("subtotal").innerText = `₹${subtotal.toFixed(2)}`;
        document.getElementById("tax").innerText = `₹${tax.toFixed(2)}`;
        document.getElementById("delivery").innerText = delivery === 0 ? "Free 🚚" : `₹${delivery.toFixed(2)}`;
        document.getElementById("total").innerText = `₹${total.toFixed(2)}`;
      }

      async function deleteCart(id) {
        try {
          const res = await fetch(`${API_BASE}/delete/${id}`, { method: "DELETE" });
          if (res.ok) loadCart();
        } catch (err) {
          console.error("Error deleting cart item:", err);
        }
      }

      async function clearCart() {
        if (!confirm("Are you sure you want to clear the cart?")) return;
        try {
          const res = await fetch(`${API_BASE}/clear`, { method: "DELETE" });
          if (res.ok) loadCart();
        } catch (err) {
          console.error("Error clearing cart:", err);
        }
      }

      async function updateQuantity(id, quantity) {
        if (quantity <= 0) { deleteCart(id); return; }
        try {
          const res = await fetch(`${API_BASE}/update/${id}?quantity=${quantity}`, { method: "PUT" });
          if (res.ok) loadCart();
        } catch (err) {
          console.error("Error updating quantity:", err);
        }
      }

      window.onload = () => { loadCart(); };
    </script>
  </body>
</html>
