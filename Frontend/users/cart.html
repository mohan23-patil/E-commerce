<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuickBuy - Cart</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#13a4ec",
              "background-light": "#f6f7f8",
              "background-dark": "#101c22",
            },
            fontFamily: {
              display: ["Manrope"],
            },
          },
        },
      };
    </script>

    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.css"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />

    <style>
      body {
        background: linear-gradient(180deg, #fff9e6 0%, #d5fefd 50%, #fed6e3 100%);
        background-attachment: fixed;
        min-height: 100vh;
        font-family: "Manrope", sans-serif;
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.25);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        transition: all 0.3s ease-in-out;
      }

      .glass-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>

  <body class="font-display text-black dark:text-white">
    <!-- 🔝 Navbar -->
    <header class="bg-yellow-400 shadow-md sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between text-gray-900">
        <a href="index.html" class="flex items-center gap-2">
          <span class="material-symbols-outlined text-3xl text-gray-900">
            shopping_bag
          </span>
          <h1 class="text-xl font-extrabold tracking-wide text-gray-900">
            QuickBuy
          </h1>
        </a>

        <nav class="hidden md:flex gap-6 font-medium text-gray-900">
          <a href="/users/userHome.html" class="hover:text-gray-700">Home</a>
          <a href="/users/products.html" class="hover:text-gray-700">Shop</a>
          <a href="/users/orders.html" class="hover:text-gray-700">My Orders</a>
          <a href="/users/about.html" class="hover:text-gray-700">About</a>
          <a href="/users/contact.html" class="hover:text-gray-700">Contact</a>
        </nav>

        <div class="flex items-center gap-4 text-gray-900">
          <a href="cart.html" class="relative">
            <span class="material-symbols-outlined text-2xl text-black">
              shopping_cart
            </span>
            <span
              id="cart-count"
              class="absolute -top-2 -right-2 bg-red-700 text-white text-xs px-1.5 py-0.5 rounded-full font-semibold"
              >0</span
            >
          </a>
          <a href="profile.html">
            <span class="material-symbols-outlined text-2xl text-black">
              account_circle
            </span>
          </a>
        </div>
      </div>
    </header>

    <!-- 🛒 Cart Section -->
    <section class="max-w-7xl mx-auto px-6 py-14">
      <h2 class="text-3xl font-bold mb-8 text-gray-900">Your Cart</h2>
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- Cart Items -->
        <div class="lg:col-span-2 space-y-6" id="cart-items"></div>

        <!-- 💳 Order Summary -->
        <div class="glass-card p-6 rounded-2xl shadow-lg">
          <h3 class="text-2xl font-extrabold mb-6 text-gray-900">Order Summary</h3>

          <div class="space-y-3 text-gray-800">
            <div class="flex justify-between">
              <span>Subtotal</span>
              <span id="subtotal" class="font-medium">₹0</span>
            </div>
            <div class="flex justify-between">
              <span>Tax (5%)</span>
              <span id="tax" class="font-medium">₹0</span>
            </div>
            <div class="flex justify-between">
              <span>Delivery</span>
              <span id="delivery" class="font-medium">₹30</span>
            </div>
            <div class="border-t border-gray-300 my-4"></div>
            <div class="flex justify-between text-lg font-bold">
              <span>Total</span>
              <span id="total">₹0</span>
            </div>
          </div>
          <a
            href="/users/checkout.html"
            class="block text-center w-full mt-8 bg-gradient-to-r from-yellow-400 to-yellow-500 text-gray-900 py-3 rounded-lg font-bold shadow transition-all duration-300 transform hover:from-green-500 hover:to-green-600 hover:scale-[1.03]"
          >
            Proceed to Checkout
          </a>

          <!-- 🧹 Clear Cart Button -->
          <button
            onclick="clearCart()"
            class="w-full mt-4 bg-red-500 hover:bg-red-600 text-white py-3 rounded-lg font-bold shadow transition-all duration-300 transform hover:scale-[1.03]"
          >
            Clear Cart
          </button>
        </div>
      </div>
    </section>

    <!-- 🌙 Footer -->
    <footer class="bg-yellow-400 text-gray-900 py-6 mt-40">
      <div
        class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-4"
      >
        <p class="text-sm font-semibold">© 2025 QuickBuy. All Rights Reserved.</p>
        <div class="flex gap-5 text-xl">
          <a href="#" class="hover:text-blue-600 transition"><i class="fa-brands fa-facebook"></i></a>
          <a href="#" class="hover:text-pink-600 transition"><i class="fa-brands fa-square-instagram"></i></a>
          <a href="#" class="hover:text-sky-500 transition"><i class="fa-brands fa-square-twitter"></i></a>
          <a href="#" class="hover:text-red-600 transition"><i class="fa-brands fa-youtube"></i></a>
        </div>
      </div>
    </footer>
    <script>
const API_BASE = "http://localhost:8080/api/cart";

// 🟢 Fetch all cart items
async function loadCart() {
  try {
    const res = await fetch(`${API_BASE}/all`);
    const data = await res.json();
    displayCart(data);
  } catch (err) {
    console.error("Error loading cart:", err);
  }
}

// 🧾 Display cart items dynamically
function displayCart(items) {
  const cartContainer = document.getElementById("cart-items");
  cartContainer.innerHTML = "";

  if (items.length === 0) {
    cartContainer.innerHTML = `
      <div class="text-center text-gray-700 text-lg font-medium bg-white p-8 rounded-xl shadow">
        🛒 Your cart is empty.
      </div>`;
    updateSummary([]);
    document.getElementById("cart-count").innerText = 0;
    return;
  }

  document.getElementById("cart-count").innerText = items.length;

  items.forEach((item) => {
    const totalPrice = (item.price * item.quantity).toFixed(2);
    const card = document.createElement("div");
    card.className =
      "glass-card p-5 rounded-2xl flex items-center gap-5 shadow hover:shadow-xl transition";
    card.innerHTML = `
      <img src="${item.image}" alt="${item.name}" class="w-24 h-24 rounded-lg object-cover border" />
      <div class="flex-1">
        <h3 class="text-lg font-bold text-gray-900">${item.name}</h3>
        <p class="text-gray-600">Price: ₹${item.price}</p>
        <div class="flex items-center gap-3 mt-2">
          <button onclick="updateQuantity(${item.id}, ${item.quantity - 1})"
            class="bg-gray-200 px-2 py-1 rounded hover:bg-gray-300">-</button>
          <span class="font-semibold">${item.quantity}</span>
          <button onclick="updateQuantity(${item.id}, ${item.quantity + 1})"
            class="bg-gray-200 px-2 py-1 rounded hover:bg-gray-300">+</button>
        </div>
      </div>
      <div class="text-right">
        <p class="text-gray-900 font-bold text-lg">₹${totalPrice}</p>
        <button onclick="deleteCart(${item.id})"
          class="text-red-500 hover:text-red-700 mt-2 text-sm font-semibold">Remove</button>
      </div>
    `;
    cartContainer.appendChild(card);
  });

  updateSummary(items);
}

// 🧮 Calculate totals
function updateSummary(items) {
  let subtotal = 0;
  items.forEach((item) => (subtotal += item.price * item.quantity));
  const tax = subtotal * 0.05;
  const delivery = items.length > 0 ? 30 : 0;
  const total = subtotal + tax + delivery;

  document.getElementById("subtotal").innerText = `₹${subtotal.toFixed(2)}`;
  document.getElementById("tax").innerText = `₹${tax.toFixed(2)}`;
  document.getElementById("delivery").innerText = `₹${delivery.toFixed(2)}`;
  document.getElementById("total").innerText = `₹${total.toFixed(2)}`;
}

// 🧮 Calculate totals
function updateSummary(items) {
  let subtotal = 0;
  items.forEach((item) => (subtotal += item.price * item.quantity));
  const tax = subtotal * 0.05;

  // ✅ Free delivery if subtotal >= 500
  const delivery = subtotal >= 500 ? 0 : (items.length > 0 ? 30 : 0);

  const total = subtotal + tax + delivery;

  document.getElementById("subtotal").innerText = `₹${subtotal.toFixed(2)}`;
  document.getElementById("tax").innerText = `₹${tax.toFixed(2)}`;
  document.getElementById("delivery").innerText =
    delivery === 0 ? "Free 🚚" : `₹${delivery.toFixed(2)}`;
  document.getElementById("total").innerText = `₹${total.toFixed(2)}`;
}


// ❌ Delete item from cart
async function deleteCart(id) {
  try {
    const res = await fetch(`${API_BASE}/delete/${id}`, { method: "DELETE" });
    if (res.ok) loadCart();
  } catch (err) {
    console.error("Error deleting cart item:", err);
  }
}

// 🧹 Clear cart
async function clearCart() {
  if (!confirm("Are you sure you want to clear the cart?")) return;
  try {
    const res = await fetch(`${API_BASE}/clear`, { method: "DELETE" });
    if (res.ok) loadCart();
  } catch (err) {
    console.error("Error clearing cart:", err);
  }
}

// 🚀 Load cart when page opens
loadCart();
</script>

  </body>
</html>
