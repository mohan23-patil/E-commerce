<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuickBuy - Checkout</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#13a4ec",
              "background-light": "#f6f7f8",
              "background-dark": "#101c22",
            },
            fontFamily: {
              display: ["Manrope"],
            },
          },
        },
      };
    </script>

    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.css"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />

    <style>
      body {
        background: linear-gradient(180deg, #fff9e6 0%, #d5fefd 50%, #fed6e3 100%);
        background-attachment: fixed;
        min-height: 100vh;
        font-family: "Manrope", sans-serif;
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.25);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        transition: all 0.3s ease-in-out;
      }

      .glass-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>

  <body class="font-display text-black dark:text-white">
    <!-- 🔝 Navbar -->
    <header class="bg-yellow-400 shadow-md sticky top-0 z-50">
      <div
        class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between text-gray-900"
      >
        <a href="index.html" class="flex items-center gap-2">
          <span class="material-symbols-outlined text-3xl text-gray-900">
            shopping_bag
          </span>
          <h1 class="text-xl font-extrabold tracking-wide text-gray-900">
            QuickBuy
          </h1>
        </a>

        <nav class="hidden md:flex gap-6 font-medium text-gray-900">
          <a href="/users/userHome.html" class="hover:text-gray-700">Home</a>
          <a href="/users/products.html" class="hover:text-gray-700">Shop</a>
          <a href="/users/orders.html" class="hover:text-gray-700">My Orders</a>
          <a href="/users/about.html" class="hover:text-gray-700">About</a>
          <a href="/users/contact.html" class="hover:text-gray-700">Contact</a>
        </nav>

        <div class="flex items-center gap-4 text-gray-900">
          <a href="cart.html" class="relative">
            <span class="material-symbols-outlined text-2xl text-black">
              shopping_cart
            </span>
            <span
              id="cart-count"
              class="absolute -top-2 -right-2 bg-red-700 text-white text-xs px-1.5 py-0.5 rounded-full font-semibold"
              >0</span
            >
          </a>
          <a href="profile.html">
            <span class="material-symbols-outlined text-2xl text-black">
              account_circle
            </span>
          </a>
        </div>
      </div>
    </header>

    <!-- 🧾 Checkout Section -->
    <section class="max-w-7xl mx-auto px-6 py-14">
      <h2 class="text-3xl font-bold mb-10 text-gray-900">Checkout</h2>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
        <!-- 🧍 Customer Info -->
        <div class="lg:col-span-2 glass-card p-8 rounded-2xl shadow-lg">
          <h3 class="text-2xl font-extrabold mb-6 text-gray-900">
            Shipping Details
          </h3>
          <form id="checkoutForm" class="space-y-5">
            <div>
              <label class="block text-gray-800 font-medium mb-2">Full Name</label>
              <input
                type="text"
                id="name"
                required
                placeholder="Enter your full name"
                class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-yellow-400"
              />
            </div>

            <div>
              <label class="block text-gray-800 font-medium mb-2">Email</label>
              <input
                type="email"
                id="email"
                required
                placeholder="you@example.com"
                class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-yellow-400"
              />
            </div>

            <div>
              <label class="block text-gray-800 font-medium mb-2">Phone</label>
              <input
                type="text"
                id="phone"
                required
                placeholder="Enter phone number"
                class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-yellow-400"
              />
            </div>

            <div>
              <label class="block text-gray-800 font-medium mb-2">Address</label>
              <textarea
                id="address"
                required
                rows="3"
                placeholder="Enter delivery address"
                class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-yellow-400"
              ></textarea>
            </div>

            <div>
              <label class="block text-gray-800 font-medium mb-2">Payment Method</label>
              <select
                id="payment"
                required
                class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-yellow-400"
              >
                <option value="">Select Payment Method</option>
                <option value="COD">Cash on Delivery</option>
                <option value="UPI">UPI / Wallet</option>
                <option value="Card">Credit / Debit Card</option>
              </select>
            </div>

            <button
              type="submit"
              class="w-full bg-gradient-to-r from-yellow-400 to-yellow-500 text-gray-900 py-3 rounded-lg font-bold shadow transition-all duration-300 hover:from-green-500 hover:to-green-600 hover:scale-[1.03]"
            >
              Place Order
            </button>
          </form>
        </div>

        <!-- 💳 Order Summary -->
        <div class="glass-card p-6 rounded-2xl shadow-lg">
          <h3 class="text-2xl font-extrabold mb-6 text-gray-900">Order Summary</h3>

          <div class="space-y-3 text-gray-800">
            <div class="flex justify-between">
              <span>Subtotal</span>
              <span id="subtotal">₹0</span>
            </div>
            <div class="flex justify-between">
              <span>Tax (5%)</span>
              <span id="tax">₹0</span>
            </div>
            <div class="flex justify-between">
              <span>Delivery</span>
              <span id="delivery">₹30</span>
            </div>
            <div class="border-t border-gray-300 my-4"></div>
            <div class="flex justify-between text-lg font-bold">
              <span>Total</span>
              <span id="total">₹0</span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- 🌙 Footer -->
    <footer class="bg-yellow-400 text-gray-900 py-6 mt-40">
      <div
        class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-4"
      >
        <p class="text-sm font-semibold">© 2025 QuickBuy. All Rights Reserved.</p>
        <div class="flex gap-5 text-xl">
          <a href="#" class="hover:text-blue-600 transition"><i class="fa-brands fa-facebook"></i></a>
          <a href="#" class="hover:text-pink-600 transition"><i class="fa-brands fa-square-instagram"></i></a>
          <a href="#" class="hover:text-sky-500 transition"><i class="fa-brands fa-square-twitter"></i></a>
          <a href="#" class="hover:text-red-600 transition"><i class="fa-brands fa-youtube"></i></a>
        </div>
      </div>
    </footer>

<script>
  const cartUrl = "https://quickbuy-woqf.onrender.com/api/cart";
  const orderUrl = "https://quickbuy-woqf.onrender.com/api/orders";

  // 🧮 Load cart summary
  async function loadSummary() {
    try {
      const res = await fetch(`${cartUrl}/all`);
      const items = await res.json();

      let subtotal = 0;
      items.forEach((i) => (subtotal += i.price * i.quantity));
      const tax = subtotal * 0.05;
      const delivery = subtotal >= 500 ? 0 : 30;
      const total = subtotal + tax + delivery;

      // update UI
      document.getElementById("subtotal").textContent = `₹${subtotal.toFixed(2)}`;
      document.getElementById("tax").textContent = `₹${tax.toFixed(2)}`;
      document.getElementById("delivery").textContent =
        delivery === 0 ? "Free" : `₹${delivery}`;
      document.getElementById("total").textContent = `₹${total.toFixed(2)}`;
      document.getElementById("cart-count").textContent = items.length;

      // store cart items and total
      localStorage.setItem("cartItems", JSON.stringify(items));
      localStorage.setItem("orderTotal", total);
    } catch (err) {
      console.error("Error loading summary:", err);
    }
  }

  // 🧾 Handle order placement
  document.getElementById("checkoutForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const address = document.getElementById("address").value.trim();
    const paymentMethod = document.getElementById("payment").value;
    const totalAmount = parseFloat(localStorage.getItem("orderTotal")) || 0;

    if (!name || !email || !phone || !address || !paymentMethod) {
      alert("⚠️ Please fill in all fields!");
      return;
    }

    // 🛒 Get cart items from localStorage
    const cartItems = JSON.parse(localStorage.getItem("cartItems")) || [];

    if (cartItems.length === 0) {
      alert("🛒 Your cart is empty!");
      return;
    }

    // Convert cart items to order items
    const orderItems = cartItems.map((item) => ({
      productName: item.name || item.productName,
      quantity: item.quantity,
      image: item.image,
    }));

    // 📦 Prepare order data
    const orderData = {
      name,
      email,
      phone,
      address,
      paymentMethod,
      totalAmount,
      status: "Pending",
      items: orderItems,
    };

    try {
      // Send order to backend
      const res = await fetch(`${orderUrl}/place`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(orderData),
      });

      if (res.ok) {
        alert("✅ Order placed successfully! Thank you for shopping with QuickBuy 💛");

        // 🧹 Clear cart (optional)
        await fetch(`${cartUrl}/clear`, { method: "DELETE" });

        // Clear local storage
        localStorage.removeItem("orderTotal");
        localStorage.removeItem("cartItems");

        // Redirect to orders page
        window.location.href = "/users/orders.html";
      } else {
        alert("❌ Failed to place order. Please try again.");
      }
    } catch (err) {
      console.error("Order error:", err);
      alert("⚠️ Server not reachable. Please start backend and try again.");
    }
  });

  // Load summary on page load
  loadSummary();
</script>


  </body>
</html>
