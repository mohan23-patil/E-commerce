<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickBuy - Checkout</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#13a4ec",
            "background-light": "#f6f7f8",
            "background-dark": "#101c22",
          },
          fontFamily: {
            display: ["Manrope"],
          },
        },
      },
    };
  </script>

  <!-- Icons -->
  <link
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.css"
    rel="stylesheet"
  />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin />

  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
    rel="stylesheet"
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    rel="stylesheet"
  />

  <style>
    * {
      scroll-behavior: smooth;
    }

    body {
      background: linear-gradient(
        180deg,
        #fff9e6 0%,
        #d5fefd 50%,
        #fed6e3 100%
      );
      background-attachment: fixed;
      min-height: 100vh;
      font-family: "Manrope", sans-serif;
      overflow-x: hidden;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      transition: all 0.3s ease-in-out;
    }

    .glass-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
    }

    .mobile-menu {
      max-height: 0;
      overflow: hidden;
      transition: all 0.4s ease;
    }

    .mobile-menu.active {
      max-height: 400px;
    }

    input,
    textarea,
    select {
      background: rgba(255, 255, 255, 0.8);
    }

    @media (max-width: 640px) {
      .checkout-title {
        font-size: 1.8rem;
      }
    }
  </style>
</head>

<body class="font-display text-black">

  <!-- Navbar -->
  <header class="bg-yellow-400 shadow-md sticky top-0 z-50">
    <div
      class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between"
    >
      <!-- Logo -->
      <a href="/users/userHome.html" class="flex items-center gap-2">
        <span class="material-symbols-outlined text-3xl">
          shopping_bag
        </span>

        <h1 class="text-xl sm:text-2xl font-extrabold tracking-wide">
          QuickBuy
        </h1>
      </a>

      <!-- Desktop Menu -->
      <nav class="hidden md:flex gap-6 font-semibold text-gray-900">
        <a href="/users/userHome.html" class="hover:text-gray-700">Home</a>
        <a href="/users/products.html" class="hover:text-gray-700">Shop</a>
        <a href="/users/orders.html" class="hover:text-gray-700">My Orders</a>
        <a href="/users/about.html" class="hover:text-gray-700">About</a>
        <a href="/users/contact.html" class="hover:text-gray-700">Contact</a>
      </nav>

      <!-- Right Icons -->
      <div class="flex items-center gap-3 sm:gap-4">
        <a href="/users/cart.html" class="relative">
          <span class="material-symbols-outlined text-2xl">
            shopping_cart
          </span>

          <span
            id="cart-count"
            class="absolute -top-2 -right-2 bg-red-700 text-white text-[10px] sm:text-xs px-1.5 py-0.5 rounded-full font-semibold"
          >
            0
          </span>
        </a>

        <a href="/users/profile.html">
          <span class="material-symbols-outlined text-2xl">
            account_circle
          </span>
        </a>

        <!-- Mobile Button -->
        <button
          id="menuBtn"
          class="md:hidden text-3xl"
        >
          ☰
        </button>
      </div>
    </div>

    <!-- Mobile Menu -->
    <div
      id="mobileMenu"
      class="mobile-menu md:hidden bg-yellow-300 px-6"
    >
      <nav class="flex flex-col py-4 gap-4 font-semibold">
        <a href="/users/userHome.html">Home</a>
        <a href="/users/products.html">Shop</a>
        <a href="/users/orders.html">My Orders</a>
        <a href="/users/about.html">About</a>
        <a href="/users/contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <!-- Checkout Section -->
  <section class="max-w-7xl mx-auto px-4 sm:px-6 py-8 sm:py-14">

    <h2
      class="checkout-title text-3xl sm:text-4xl font-extrabold mb-10 text-gray-900"
    >
      Checkout
    </h2>

    <div class="grid grid-cols-1 xl:grid-cols-3 gap-8 lg:gap-10">

      <!-- Shipping Form -->
      <div class="xl:col-span-2 glass-card p-5 sm:p-8 rounded-2xl shadow-lg">

        <h3 class="text-2xl font-extrabold mb-6 text-gray-900">
          Shipping Details
        </h3>

        <form id="checkoutForm" class="space-y-5">

          <!-- Name -->
          <div>
            <label class="block text-gray-800 font-medium mb-2">
              Full Name
            </label>

            <input
              type="text"
              id="name"
              required
              placeholder="Enter your full name"
              class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-yellow-400 outline-none"
            />
          </div>

          <!-- Email -->
          <div>
            <label class="block text-gray-800 font-medium mb-2">
              Email
            </label>

            <input
              type="email"
              id="email"
              required
              placeholder="you@example.com"
              class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-yellow-400 outline-none"
            />
          </div>

          <!-- Phone -->
          <div>
            <label class="block text-gray-800 font-medium mb-2">
              Phone
            </label>

            <input
              type="text"
              id="phone"
              required
              placeholder="Enter phone number"
              class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-yellow-400 outline-none"
            />
          </div>

          <!-- Address -->
          <div>
            <label class="block text-gray-800 font-medium mb-2">
              Address
            </label>

            <textarea
              id="address"
              rows="4"
              required
              placeholder="Enter delivery address"
              class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-yellow-400 outline-none resize-none"
            ></textarea>
          </div>

          <!-- Payment -->
          <div>
            <label class="block text-gray-800 font-medium mb-2">
              Payment Method
            </label>

            <select
              id="payment"
              required
              class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-yellow-400 outline-none"
            >
              <option value="">Select Payment Method</option>
              <option value="COD">Cash on Delivery</option>
              <option value="UPI">UPI / Wallet</option>
              <option value="Card">Credit / Debit Card</option>
            </select>
          </div>

          <!-- Button -->
          <button
            type="submit"
            class="w-full bg-gradient-to-r from-yellow-400 to-yellow-500 text-gray-900 py-3 rounded-xl font-bold shadow transition-all duration-300 hover:from-green-500 hover:to-green-600 hover:text-white hover:scale-[1.02]"
          >
            Place Order
          </button>

        </form>
      </div>

      <!-- Order Summary -->
      <div class="glass-card p-5 sm:p-6 rounded-2xl shadow-lg h-fit">

        <h3 class="text-2xl font-extrabold mb-6 text-gray-900">
          Order Summary
        </h3>

        <div class="space-y-4 text-gray-800">

          <div class="flex justify-between">
            <span>Subtotal</span>
            <span id="subtotal">₹0</span>
          </div>

          <div class="flex justify-between">
            <span>Tax (5%)</span>
            <span id="tax">₹0</span>
          </div>

          <div class="flex justify-between">
            <span>Delivery</span>
            <span id="delivery">₹30</span>
          </div>

          <div class="border-t border-gray-300 pt-4"></div>

          <div class="flex justify-between text-xl font-bold">
            <span>Total</span>
            <span id="total">₹0</span>
          </div>

        </div>
      </div>

    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-yellow-400 text-gray-900 py-6 mt-16">
    <div
      class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-4"
    >
      <p class="text-sm font-semibold text-center">
        © 2025 QuickBuy. All Rights Reserved.
      </p>

      <div class="flex gap-5 text-xl">
        <a href="#" class="hover:text-blue-600 transition">
          <i class="fa-brands fa-facebook"></i>
        </a>

        <a href="#" class="hover:text-pink-600 transition">
          <i class="fa-brands fa-square-instagram"></i>
        </a>

        <a href="#" class="hover:text-sky-500 transition">
          <i class="fa-brands fa-square-twitter"></i>
        </a>

        <a href="#" class="hover:text-red-600 transition">
          <i class="fa-brands fa-youtube"></i>
        </a>
      </div>
    </div>
  </footer>

  <script>
    const cartUrl = "https://quickbuy-woqf.onrender.com/api/cart";
    const orderUrl = "https://quickbuy-woqf.onrender.com/api/orders";

    // Mobile Menu
    const menuBtn = document.getElementById("menuBtn");
    const mobileMenu = document.getElementById("mobileMenu");

    menuBtn.addEventListener("click", () => {
      mobileMenu.classList.toggle("active");
    });

    // Load Order Summary
    async function loadSummary() {
      try {
        const res = await fetch(`${cartUrl}/all`);
        const items = await res.json();

        let subtotal = 0;

        items.forEach((item) => {
          subtotal += item.price * item.quantity;
        });

        const tax = subtotal * 0.05;

        const delivery =
          subtotal >= 500 || subtotal === 0 ? 0 : 30;

        const total = subtotal + tax + delivery;

        document.getElementById("subtotal").textContent =
          `₹${subtotal.toFixed(2)}`;

        document.getElementById("tax").textContent =
          `₹${tax.toFixed(2)}`;

        document.getElementById("delivery").textContent =
          delivery === 0 ? "Free 🚚" : `₹${delivery}`;

        document.getElementById("total").textContent =
          `₹${total.toFixed(2)}`;

        document.getElementById("cart-count").textContent =
          items.length;

        localStorage.setItem(
          "cartItems",
          JSON.stringify(items)
        );

        localStorage.setItem(
          "orderTotal",
          total
        );

      } catch (err) {
        console.error("Error loading summary:", err);
      }
    }

    // Place Order
    document
      .getElementById("checkoutForm")
      .addEventListener("submit", async (e) => {

        e.preventDefault();

        const name =
          document.getElementById("name").value.trim();

        const email =
          document.getElementById("email").value.trim();

        const phone =
          document.getElementById("phone").value.trim();

        const address =
          document.getElementById("address").value.trim();

        const paymentMethod =
          document.getElementById("payment").value;

        const totalAmount =
          parseFloat(localStorage.getItem("orderTotal")) || 0;

        if (
          !name ||
          !email ||
          !phone ||
          !address ||
          !paymentMethod
        ) {
          alert("⚠️ Please fill in all fields!");
          return;
        }

        const cartItems =
          JSON.parse(localStorage.getItem("cartItems")) || [];

        if (cartItems.length === 0) {
          alert("🛒 Your cart is empty!");
          return;
        }

        const orderItems = cartItems.map((item) => ({
          productName: item.name || item.productName,
          quantity: item.quantity,
          image: item.image,
        }));

        const orderData = {
          name,
          email,
          phone,
          address,
          paymentMethod,
          totalAmount,
          status: "Pending",
          items: orderItems,
        };

        try {

          const res = await fetch(`${orderUrl}/place`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(orderData),
          });

          if (res.ok) {

            alert(
              "✅ Order placed successfully! Thank you for shopping with QuickBuy 💛"
            );

            await fetch(`${cartUrl}/clear`, {
              method: "DELETE",
            });

            localStorage.removeItem("orderTotal");
            localStorage.removeItem("cartItems");

            window.location.href =
              "/users/orders.html";

          } else {
            alert(
              "❌ Failed to place order. Please try again."
            );
          }

        } catch (err) {

          console.error("Order error:", err);

          alert(
            "⚠️ Server not reachable. Please start backend and try again."
          );
        }
      });

    // Load on Start
    loadSummary();
  </script>

</body>
</html>
