<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuickBuy - Products</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#13a4ec",
              "background-light": "#f6f7f8",
              "background-dark": "#101c22",
            },
            fontFamily: { display: ["Manrope"] },
          },
        },
      };
    </script>
    <link 
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.css" rel="stylesheet" 
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />

    <style>
      @keyframes marquee {
        0% {
          transform: translateX(100%);
        }
        100% {
          transform: translateX(-100%);
        }
      }
      .animate-marquee {
        display: inline-block;
        padding-left: 100%;
        animation: marquee 20s linear infinite;
      }
      body {
        background: linear-gradient(135deg, #fff9e6, #d5fefd, #fed6e3);
        min-height: 100vh;
        font-family: "Manrope", sans-serif;
      }
      .product-card {
        background-color: rgba(255, 255, 255, 0.95);
        border-radius: 0.75rem;
        padding: 1rem;
        transition: all 0.3s ease;
        cursor: pointer;
        position: relative;
        overflow: hidden;
      }
      .product-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
      }
      .offer-badge {
        position: absolute;
        top: 10px;
        left: 10px;
        background-color: #dc2626;
        color: #fff;
        font-size: 0.75rem;
        font-weight: 700;
        padding: 4px 10px;
        border-radius: 9999px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      }
    </style>
  </head>

  <body class="text-gray-900">
    <!-- Navbar -->
    <header class="bg-yellow-400 shadow-md sticky top-0 z-50">
      <div
        class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between text-gray-900"
      >
        <a href="index.html" class="flex items-center gap-2">
          <span class="material-symbols-outlined text-3xl text-gray-900"
            >shopping_bag</span
          >
          <h1 class="text-xl font-extrabold tracking-wide text-gray-900">
            QuickBuy
          </h1>
        </a>

        <nav class="hidden md:flex gap-6 font-medium text-gray-900">
          <a href="/users/userHome.html" class="hover:text-gray-700">Home</a>
          <a href="/users/products.html" class="hover:text-gray-700 font-bold"
            >Shop</a
          >
          <a href="/users/orders.html" class="hover:text-gray-700">My Orders</a>
          <a href="/users/about.html" class="hover:text-gray-700">About</a>
          <a href="/users/contact.html" class="hover:text-gray-700">Contact</a>
        </nav>

        <div class="flex items-center gap-4 text-gray-900">
          <a href="cart.html" class="relative">
            <span class="material-symbols-outlined text-2xl text-black"
              >shopping_cart</span
            >
            <span
              id="cart-count"
              class="absolute -top-2 -right-2 bg-red-700 text-white text-xs px-1.5 py-0.5 rounded-full font-semibold"
              >2</span
            >
          </a>
          <a href="profile.html"
            ><span class="material-symbols-outlined text-2xl text-black"
              >account_circle</span
            ></a
          >
        </div>
      </div>
    </header>

    <!-- Offer Marquee -->
    <section class="bg-red-100 py-3 overflow-hidden border-b border-red-300">
      <div
        class="animate-marquee whitespace-nowrap text-center text-red-700 font-bold text-lg"
      >
        🎉 Diwali Dhamaka Offer! Up to 50% OFF on Electronics & Fashion! 🛍️
        Hurry, limited time only! 💥 Free Shipping on orders above ₹2000! 🪔
      </div>
    </section>

    <!-- Search + Category + Sort -->
    <section class="max-w-7xl mx-auto px-6 py-10">
      <div
        class="flex flex-col md:flex-row items-center justify-between gap-4 bg-white/80 p-4 rounded-lg shadow-md"
      >
        <input
          id="searchInput"
          type="text"
          placeholder="Search products..."
          class="w-full md:w-1/3 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:outline-none bg-transparent"
        />

        <select
          id="categorySelect"
          class="w-full md:w-1/3 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:outline-none bg-transparent"
        >
          <option value="">All Categories</option>
          <option value="Mobile">Mobiles</option>
          <option value="Laptop">Laptops</option>
          <option value="Watch">Watches</option>
          <option value="Clothes">Clothes</option>
          <option value="Electronics">Electronics</option>
        </select>

        <select
          id="sortSelect"
          class="w-full md:w-1/3 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:outline-none bg-transparent"
        >
          <option value="">Sort by</option>
          <option value="low">Price: Low to High</option>
          <option value="high">Price: High to Low</option>
          <option value="new">Newest</option>
        </select>
      </div>
    </section>

    <!-- Product Section -->
    <section class="max-w-7xl mx-auto px-6 pb-14">
      <h2 id="pageTitle" class="text-2xl font-bold mb-6">All Products</h2>
      <div
        id="productGrid"
        class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"
      ></div>
    </section>
    <footer class="bg-yellow-400 text-gray-900 py-6 mt-10">
      <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-4">
        <p class="text-sm font-semibold">© 2025 QuickBuy. All Rights Reserved.</p>
        <div class="flex gap-5 text-xl">
          <a href="#" class="hover:text-blue-600 transition"><i class="fa-brands fa-facebook"></i></a>
          <a href="#" class="hover:text-pink-600 transition"><i class="fa-brands fa-square-instagram"></i></a>
          <a href="#" class="hover:text-sky-500 transition"><i class="fa-brands fa-square-twitter"></i></a>
          <a href="#" class="hover:text-red-600 transition"><i class="fa-brands fa-youtube"></i></a>
        </div>
      </div>
    </footer>
    <script>
      const baseUrl = "http://localhost:8080/api/products";
      const grid = document.getElementById("productGrid");
      const searchInput = document.getElementById("searchInput");
      const categorySelect = document.getElementById("categorySelect");
      const sortSelect = document.getElementById("sortSelect");
      const pageTitle = document.getElementById("pageTitle");

      let allProducts = [];

      // ✅ Fetch products from API
      async function fetchProducts(category = "") {
        let url = category
          ? `${baseUrl}/category/${encodeURIComponent(category)}`
          : `${baseUrl}/all`;

        try {
          const res = await fetch(url);
          const data = await res.json();

          // ✅ Use real backend discount (no random generation)
          allProducts = data;

          renderProducts(allProducts);

          categorySelect.value = category;
          pageTitle.textContent = category
            ? `${category} Products`
            : "All Products";
        } catch (error) {
          console.error(error);
          grid.innerHTML =
            "<p class='text-center text-red-600 col-span-full'>Failed to load products.</p>";
        }
      }

      // ✅ Render product cards
      function renderProducts(products) {
        if (!products || products.length === 0) {
          grid.innerHTML =
            "<p class='text-center text-gray-600 col-span-full'>No products found.</p>";
          return;
        }

        grid.innerHTML = products
          .map((p) => {
            const discountedPrice = (
              p.price -
              (p.price * (p.discount || 0)) / 100
            ).toFixed(0);
            return `
          <div class="product-card" onclick="goToDetails(${p.id})">
            ${
              p.discount > 0
                ? `<span class="offer-badge">${p.discount}% OFF</span>`
                : ""
            }
            <img src="http://localhost:8080/uploads/${p.image}" 
                 alt="${p.name}" 
                 class="w-full h-48 object-cover rounded-lg mb-4"
                 onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'"/>
            <h4 class="font-semibold text-lg">${p.name}</h4>
            <p class="text-gray-600 text-sm mb-2">${p.description.substring(0, 60)}...</p>
            <div class="flex items-center gap-2 mb-2">
              ${
                p.discount > 0
                  ? `<p class="text-red-600 font-bold line-through text-sm">₹${p.price}</p>
                     <p class="font-bold text-lg text-dark-600">₹${discountedPrice}</p>`
                  : `<p class="font-bold text-lg text-dark-600">₹${p.price}</p>`
              }
            </div>
          </div>`;
          })
          .join("");
      }

      function goToDetails(id) {
        window.location.href = `/users/product-details.html?id=${id}`;
      }

      function applyFilters() {
        let filtered = [...allProducts];
        const searchValue = searchInput.value.toLowerCase().trim();
        const sortValue = sortSelect.value;

        if (searchValue) {
          filtered = filtered.filter(
            (p) =>
              p.name.toLowerCase().includes(searchValue) ||
              p.description.toLowerCase().includes(searchValue)
          );
        }

        if (sortValue === "low") filtered.sort((a, b) => a.price - b.price);
        else if (sortValue === "high") filtered.sort((a, b) => b.price - a.price);
        else if (sortValue === "new") filtered.sort((a, b) => b.id - a.id);

        renderProducts(filtered);
      }

      searchInput.addEventListener("input", applyFilters);
      sortSelect.addEventListener("change", applyFilters);
      categorySelect.addEventListener("change", (e) => {
        const selected = e.target.value;
        fetchProducts(selected);
      });

      const urlParams = new URLSearchParams(window.location.search);
      const categoryFromURL = urlParams.get("category");

      window.onload = () => {
        fetchProducts(categoryFromURL || "");
      };

      // ✅ Update Cart Count Dynamically
    async function updateCartCount() {
      const cartCountEl = document.getElementById("cart-count");
      try {
        const res = await fetch("http://localhost:8080/api/cart/all");
        if (res.ok) {
          const data = await res.json();
          cartCountEl.textContent = data.length;
        } else {
          cartCountEl.textContent = "0";
        }
      } catch (error) {
        console.error("Cart count fetch failed:", error);
        cartCountEl.textContent = "0";
      }
    }

    // 🔄 Call it when page loads
    window.onload = () => {
      fetchProducts(categoryFromURL || "");
      updateCartCount();
    };

    </script>
  </body>
</html>
