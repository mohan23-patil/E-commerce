<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuickBuy - Edit Profile</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#13a4ec",
              "background-light": "#f6f7f8",
              "background-dark": "#101c22",
            },
            fontFamily: {
              display: ["Manrope"],
            },
          },
        },
      };
    </script>

    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.css"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />

    <style>
      body {
        background: linear-gradient(180deg, #fff9e6 0%, #d5fefd 50%, #fed6e3 100%);
        background-attachment: fixed;
        font-family: "Manrope", sans-serif;
        min-height: 100vh;
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.35);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        transition: all 0.3s ease-in-out;
      }

      .glass-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      }

      .save-btn:hover {
        background: linear-gradient(to right, #22c55e, #16a34a);
        transform: scale(1.03);
      }

      .cancel-btn:hover {
        background: linear-gradient(to right, #ef4444, #dc2626);
        transform: scale(1.03);
      }
    </style>
  </head>

  <body class="font-display text-black dark:text-white">
    <!-- 🌐 Navbar -->
    <header class="bg-yellow-400 shadow-md sticky top-0 z-50">
      <div
        class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between text-gray-900"
      >
        <a href="index.html" class="flex items-center gap-2">
          <span class="material-symbols-outlined text-3xl text-gray-900">
            shopping_bag
          </span>
          <h1 class="text-xl font-extrabold tracking-wide text-gray-900">
            QuickBuy
          </h1>
        </a>

        <nav class="hidden md:flex gap-6 font-medium text-gray-900">
          <a href="/users/userHome.html" class="hover:text-gray-700">Home</a>
          <a href="/users/products.html" class="hover:text-gray-700">Shop</a>
          <a href="/users/orders.html" class="hover:text-gray-700">My Orders</a>
          <a href="/users/about.html" class="hover:text-gray-700">About</a>
          <a href="/users/contact.html" class="hover:text-gray-700">Contact</a>
        </nav>

        <div class="flex items-center gap-4 text-gray-900">
          <a href="cart.html" class="relative">
            <span class="material-symbols-outlined text-2xl text-black">
              shopping_cart
            </span>
            <span
              id="cart-count"
              class="absolute -top-2 -right-2 bg-red-700 text-white text-xs px-1.5 py-0.5 rounded-full font-semibold"
              >2</span
            >
          </a>
          <a href="profile.html">
            <span class="material-symbols-outlined text-2xl text-black">
              account_circle
            </span>
          </a>
        </div>
      </div>
    </header>

    <!-- 👤 Edit Profile Section -->
    <section class="max-w-2xl mx-auto px-6 py-14">
      <div class="glass-card p-8 rounded-2xl shadow">
        <h2 class="text-3xl font-bold mb-8 text-gray-900 text-center">
          Edit Profile
        </h2>

        <!-- Form -->
        <form id="editProfileForm" class="space-y-5">
          <div>
            <label class="block text-gray-700 font-medium mb-1">Full Name</label>
            <input
              type="text"
              id="name"
              placeholder="Enter your full name"
              class="w-full rounded-lg border-gray-300 focus:ring-primary focus:border-primary"
            />
          </div>

          <div>
            <label class="block text-gray-700 font-medium mb-1">Email</label>
            <input
              type="email"
              id="email"
              readonly
              class="w-full rounded-lg border-gray-300 bg-gray-100 text-gray-600"
            />
          </div>

          <div>
            <label class="block text-gray-700 font-medium mb-1">Phone</label>
            <input
              type="text"
              id="phone"
              placeholder="Phone number"
              class="w-full rounded-lg border-gray-300 focus:ring-primary focus:border-primary"
            />
          </div>

          <div>
            <label class="block text-gray-700 font-medium mb-1">Address</label>
            <textarea
              id="address"
              rows="3"
              placeholder="Enter your address"
              class="w-full rounded-lg border-gray-300 focus:ring-primary focus:border-primary"
            ></textarea>
          </div>

          <div class="flex gap-4 mt-8">
            <button
              type="submit"
              class="save-btn w-full bg-gradient-to-r from-yellow-400 to-yellow-500 text-gray-900 py-3 rounded-lg font-bold shadow transition-all duration-300"
            >
              Save Changes
            </button>
            <a
              href="profile.html"
              class="cancel-btn w-full bg-gray-300 text-gray-800 py-3 rounded-lg font-bold shadow transition-all duration-300 text-center"
              >Cancel</a
            >
          </div>
        </form>
      </div>
    </section>

    <footer class="bg-yellow-400 text-gray-900 py-6 mt-10">
      <div
        class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-4"
      >
        <p class="text-sm font-semibold">
          © 2025 QuickBuy. All Rights Reserved.
        </p>
        <div class="flex gap-5 text-xl">
          <a href="#" class="hover:text-blue-600 transition"
            ><i class="fa-brands fa-facebook"></i
          ></a>
          <a href="#" class="hover:text-pink-600 transition"
            ><i class="fa-brands fa-square-instagram"></i
          ></a>
          <a href="#" class="hover:text-sky-500 transition"
            ><i class="fa-brands fa-square-twitter"></i
          ></a>
          <a href="#" class="hover:text-red-600 transition"
            ><i class="fa-brands fa-youtube"></i
          ></a>
        </div>
      </div>
    </footer>

   <script>
// ✅ Fetch user data dynamically from backend
document.addEventListener("DOMContentLoaded", async () => {
  const email = localStorage.getItem("userEmail");
  if (!email) {
    window.location.href = "../index.html";
    return;
  }

  try {
    const res = await fetch(`http://localhost:8080/api/users/${email}`);
    if (!res.ok) throw new Error("User not found");

    const user = await res.json();
    document.getElementById("name").value = user.name || "";
    document.getElementById("email").value = user.email || "";
    document.getElementById("phone").value = user.phone || "";
    document.getElementById("address").value = user.address || "";
  } catch (err) {
    console.error(err);
    alert("Error fetching user details!");
  }

  // ✅ Call updateCartCount when page loads
  updateCartCount();
});

// ✅ Update user profile
document
  .getElementById("editProfileForm")
  .addEventListener("submit", async (e) => {
    e.preventDefault();

    const updatedUser = {
      name: document.getElementById("name").value,
      email: document.getElementById("email").value,
      phone: document.getElementById("phone").value,
      address: document.getElementById("address").value,
    };

    try {
      const res = await fetch(
        `http://localhost:8080/api/users/update/${updatedUser.email}`,
        {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(updatedUser),
        }
      );

      if (!res.ok) throw new Error("Update failed");

      alert("Profile updated successfully!");
      window.location.href = "profile.html";
    } catch (err) {
      console.error(err);
      alert("Error updating profile!");
    }
  });

// ✅ Update Cart Count Dynamically
async function updateCartCount() {
  const cartCountEl = document.getElementById("cart-count");
  try {
    const res = await fetch("http://localhost:8080/api/cart/all");
    if (res.ok) {
      const data = await res.json();
      cartCountEl.textContent = data.length || 0;
    } else {
      cartCountEl.textContent = "0";
    }
  } catch (error) {
    console.error("Cart count fetch failed:", error);
    cartCountEl.textContent = "0";
  }
}
</script>

  </body>
</html>
