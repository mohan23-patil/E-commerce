<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuickBuy - Edit Profile</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#13a4ec",
            },
            fontFamily: {
              display: ["Manrope"],
            },
          },
        },
      };
    </script>

    <!-- Fonts & Icons -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      rel="stylesheet"
    />

    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link
      href="https://fonts.gstatic.com"
      rel="preconnect"
      crossorigin
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />

    <style>
      body {
        background: linear-gradient(
          180deg,
          #fff9e6 0%,
          #d5fefd 50%,
          #fed6e3 100%
        );
        background-attachment: fixed;
        min-height: 100vh;
        font-family: "Manrope", sans-serif;
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.35);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.25);
        transition: all 0.3s ease;
      }

      .glass-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 25px rgba(0, 0, 0, 0.1);
      }

      .mobile-menu {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.4s ease;
      }

      .mobile-menu.active {
        max-height: 400px;
      }

      input,
      textarea {
        transition: all 0.3s ease;
      }

      input:focus,
      textarea:focus {
        transform: scale(1.01);
      }
    </style>
  </head>

  <body class="font-display text-black">

    <!-- ================= NAVBAR ================= -->
    <header class="bg-yellow-400 shadow-md sticky top-0 z-50">
      <div
        class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between"
      >

        <!-- Logo -->
        <a href="/users/userHome.html" class="flex items-center gap-2">
          <span class="material-symbols-outlined text-3xl">
            shopping_bag
          </span>

          <h1 class="text-xl md:text-2xl font-extrabold tracking-wide">
            QuickBuy
          </h1>
        </a>

        <!-- Desktop Navigation -->
        <nav class="hidden md:flex gap-6 font-semibold">
          <a
            href="/users/userHome.html"
            class="hover:text-gray-700 transition"
          >
            Home
          </a>

          <a
            href="/users/products.html"
            class="hover:text-gray-700 transition"
          >
            Shop
          </a>

          <a
            href="/users/orders.html"
            class="hover:text-gray-700 transition"
          >
            My Orders
          </a>

          <a
            href="/users/about.html"
            class="hover:text-gray-700 transition"
          >
            About
          </a>

          <a
            href="/users/contact.html"
            class="hover:text-gray-700 transition"
          >
            Contact
          </a>
        </nav>

        <!-- Right Icons -->
        <div class="flex items-center gap-4">

          <!-- Cart -->
          <a href="/users/cart.html" class="relative">
            <span class="material-symbols-outlined text-3xl">
              shopping_cart
            </span>

            <span
              id="cart-count"
              class="absolute -top-2 -right-2 bg-red-600 text-white text-xs px-1.5 py-0.5 rounded-full font-bold"
            >
              0
            </span>
          </a>

          <!-- Profile -->
          <a href="/users/profile.html">
            <span class="material-symbols-outlined text-3xl">
              account_circle
            </span>
          </a>

          <!-- Mobile Menu Button -->
          <button
            id="menu-btn"
            class="md:hidden flex items-center"
          >
            <span class="material-symbols-outlined text-3xl">
              menu
            </span>
          </button>
        </div>
      </div>

      <!-- Mobile Menu -->
      <div
        id="mobile-menu"
        class="mobile-menu md:hidden bg-yellow-300"
      >
        <nav class="flex flex-col px-6 py-4 gap-4 font-semibold">
          <a href="/users/userHome.html">Home</a>
          <a href="/users/products.html">Shop</a>
          <a href="/users/orders.html">My Orders</a>
          <a href="/users/about.html">About</a>
          <a href="/users/contact.html">Contact</a>
        </nav>
      </div>
    </header>

    <!-- ================= PROFILE SECTION ================= -->
    <section class="max-w-3xl mx-auto px-4 sm:px-6 py-10 sm:py-14">

      <div
        class="glass-card rounded-3xl shadow-xl p-5 sm:p-8 md:p-10"
      >

        <!-- Profile Icon -->
        <div class="flex justify-center mb-6">
          <div
            class="w-24 h-24 bg-yellow-400 rounded-full flex items-center justify-center shadow-lg"
          >
            <span class="material-symbols-outlined text-5xl text-gray-900">
              person
            </span>
          </div>
        </div>

        <!-- Title -->
        <h2
          class="text-2xl sm:text-3xl md:text-4xl font-extrabold text-center text-gray-900 mb-8"
        >
          Edit Profile
        </h2>

        <!-- Form -->
        <form id="editProfileForm" class="space-y-5">

          <!-- Name -->
          <div>
            <label
              class="block text-gray-700 font-semibold mb-2"
            >
              Full Name
            </label>

            <input
              type="text"
              id="name"
              placeholder="Enter your full name"
              class="w-full rounded-xl border border-gray-300 bg-white/80 px-4 py-3 focus:ring-2 focus:ring-yellow-400 outline-none"
            />
          </div>

          <!-- Email -->
          <div>
            <label
              class="block text-gray-700 font-semibold mb-2"
            >
              Email
            </label>

            <input
              type="email"
              id="email"
              readonly
              class="w-full rounded-xl border border-gray-300 bg-gray-100 px-4 py-3 text-gray-600"
            />
          </div>

          <!-- Phone -->
          <div>
            <label
              class="block text-gray-700 font-semibold mb-2"
            >
              Phone Number
            </label>

            <input
              type="text"
              id="phone"
              placeholder="Enter your phone number"
              class="w-full rounded-xl border border-gray-300 bg-white/80 px-4 py-3 focus:ring-2 focus:ring-yellow-400 outline-none"
            />
          </div>

          <!-- Address -->
          <div>
            <label
              class="block text-gray-700 font-semibold mb-2"
            >
              Address
            </label>

            <textarea
              id="address"
              rows="4"
              placeholder="Enter your address"
              class="w-full rounded-xl border border-gray-300 bg-white/80 px-4 py-3 focus:ring-2 focus:ring-yellow-400 outline-none"
            ></textarea>
          </div>

          <!-- Buttons -->
          <div
            class="flex flex-col sm:flex-row gap-4 pt-4"
          >

            <!-- Save -->
            <button
              type="submit"
              class="w-full bg-gradient-to-r from-yellow-400 to-yellow-500 text-gray-900 py-3 rounded-xl font-bold shadow-lg hover:from-green-500 hover:to-green-600 hover:text-white transition-all duration-300 hover:scale-[1.02]"
            >
              Save Changes
            </button>

            <!-- Cancel -->
            <a
              href="/users/profile.html"
              class="w-full bg-gray-300 text-gray-800 py-3 rounded-xl font-bold text-center shadow-lg hover:bg-red-500 hover:text-white transition-all duration-300 hover:scale-[1.02]"
            >
              Cancel
            </a>
          </div>
        </form>
      </div>
    </section>

    <!-- ================= FOOTER ================= -->
    <footer class="bg-yellow-400 text-gray-900 py-6 mt-10">
      <div
        class="max-w-7xl mx-auto px-4 sm:px-6 flex flex-col md:flex-row items-center justify-between gap-5"
      >

        <p class="text-sm font-semibold text-center md:text-left">
          © 2025 QuickBuy. All Rights Reserved.
        </p>

        <!-- Social Icons -->
        <div class="flex gap-5 text-2xl">

          <a
            href="#"
            class="hover:text-blue-600 transition"
          >
            <i class="fa-brands fa-facebook"></i>
          </a>

          <a
            href="#"
            class="hover:text-pink-600 transition"
          >
            <i class="fa-brands fa-instagram"></i>
          </a>

          <a
            href="#"
            class="hover:text-sky-500 transition"
          >
            <i class="fa-brands fa-twitter"></i>
          </a>

          <a
            href="#"
            class="hover:text-red-600 transition"
          >
            <i class="fa-brands fa-youtube"></i>
          </a>
        </div>
      </div>
    </footer>

    <!-- ================= JAVASCRIPT ================= -->
    <script>

      // ================= MOBILE MENU =================
      const menuBtn = document.getElementById("menu-btn");
      const mobileMenu = document.getElementById("mobile-menu");

      menuBtn.addEventListener("click", () => {
        mobileMenu.classList.toggle("active");
      });

      // ================= FETCH USER DATA =================
      document.addEventListener("DOMContentLoaded", async () => {

        const email = localStorage.getItem("userEmail");

        if (!email) {
          window.location.href = "../index.html";
          return;
        }

        try {

          const res = await fetch(
            `https://quickbuy-woqf.onrender.com/api/users/${email}`
          );

          if (!res.ok) {
            throw new Error("User not found");
          }

          const user = await res.json();

          document.getElementById("name").value =
            user.name || "";

          document.getElementById("email").value =
            user.email || "";

          document.getElementById("phone").value =
            user.phone || "";

          document.getElementById("address").value =
            user.address || "";

        } catch (err) {

          console.error(err);
          alert("Error fetching user details!");

        }

        // Update cart count
        updateCartCount();
      });

      // ================= UPDATE PROFILE =================
      document
        .getElementById("editProfileForm")
        .addEventListener("submit", async (e) => {

          e.preventDefault();

          const updatedUser = {
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            phone: document.getElementById("phone").value,
            address: document.getElementById("address").value,
          };

          try {

            const res = await fetch(
              `https://quickbuy-woqf.onrender.com/api/users/update/${updatedUser.email}`,
              {
                method: "PUT",
                headers: {
                  "Content-Type": "application/json",
                },
                body: JSON.stringify(updatedUser),
              }
            );

            if (!res.ok) {
              throw new Error("Update failed");
            }

            alert("✅ Profile updated successfully!");

            window.location.href =
              "/users/profile.html";

          } catch (err) {

            console.error(err);
            alert("❌ Error updating profile!");

          }
        });

      // ================= UPDATE CART COUNT =================
      async function updateCartCount() {

        const cartCountEl =
          document.getElementById("cart-count");

        try {

          const res = await fetch(
            "https://quickbuy-woqf.onrender.com/api/cart/all"
          );

          if (res.ok) {

            const data = await res.json();

            cartCountEl.textContent =
              data.length || 0;

          } else {

            cartCountEl.textContent = "0";

          }

        } catch (error) {

          console.error(
            "Cart count fetch failed:",
            error
          );

          cartCountEl.textContent = "0";
        }
      }
    </script>
  </body>
</html>
